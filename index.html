<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Angeltagebuch – Norbert</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --nvy:#002855;--nvy-d:#001530;--nvy-m:#003d7a;--nvy-l:#dce9f8;
  --gld:#c8921a;--gld-b:#daa520;
  --warm:#f5f0e8;--warm2:#ece6d8;
  --wh:#fff;--bd:#d0c9bc;
  --tx:#1c2a1e;--mt:#6a7862;--lt:#a8b09e;
  --ok:#1a6b3c;--er:#b0291e;
  --nav:64px;
}
html,body{height:100%;font-family:'DM Sans',system-ui,sans-serif;background:#1a2218;color:var(--tx)}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}
#root{width:100%;max-width:480px;height:100vh;height:100dvh;display:flex;flex-direction:column;background:var(--warm);position:relative}
@media(min-width:500px){#root{border-radius:16px;height:96vh;height:96dvh;box-shadow:0 0 0 1px rgba(0,20,10,.15),0 24px 64px rgba(0,0,0,.5)}}
.page{flex:1;overflow-y:auto;overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bd)}
/* HERO */
.hero{position:relative;height:248px;overflow:hidden;flex-shrink:0;background:var(--nvy-d);display:flex;align-items:flex-start}
.hero-fish{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 30%;filter:saturate(1.08) brightness(1.0)}
.hero-ov1{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,8,20,.72) 0%,rgba(0,10,24,.45) 40%,transparent 65%)}
.hero-ov2{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,6,18,.35) 0%,transparent 45%)}
.hero-c{position:relative;z-index:2;padding:52px 20px 0;width:100%;text-align:center}
.hero-eyebrow{font-size:.6rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--gld-b);margin-bottom:8px}
.hero-title{font-family:'Playfair Display',serif;font-size:1.58rem;font-weight:800;color:#fff;line-height:1.22}
.hero-title em{font-style:italic;color:var(--gld-b)}
.hero-line{display:none}
.hero-sub{font-size:.7rem;color:rgba(255,255,255,.46)}
/* STATUS */
.statusbar{background:var(--nvy-d);color:rgba(255,255,255,.38);font-size:.62rem;display:flex;align-items:center;gap:7px;padding:4px 14px;flex-shrink:0}
.sdot{width:5px;height:5px;background:var(--gld-b);border-radius:50%;animation:pulse 2.5s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
/* NAV */
.bnav{background:var(--nvy-d);display:flex;align-items:center;justify-content:space-around;height:var(--nav);flex-shrink:0;border-top:1px solid rgba(255,255,255,.06)}
.bni{display:flex;flex-direction:column;align-items:center;gap:2px;color:rgba(255,255,255,.33);cursor:pointer;padding:6px 28px;font-size:.75rem;font-weight:600;border:none;background:none;font-family:inherit}
.bni:hover,.bni.act{color:#fff}.bni.act .bni-i{color:var(--gld-b)}
.bni-i{font-size:24px;line-height:1}
.fab{position:fixed;bottom:77px;right:16px;width:52px;height:52px;background:var(--gld-b);color:#fff;border:none;border-radius:50%;font-size:28px;cursor:pointer;box-shadow:0 4px 18px rgba(200,145,25,.6);display:flex;align-items:center;justify-content:center;z-index:40;line-height:1}
@media(min-width:500px){.fab{right:calc(50vw - 240px + 16px)}}
/* SEARCH */
.fbar{padding:10px 13px 9px;background:var(--wh);border-bottom:1px solid var(--bd);flex-shrink:0}
.sinp{width:100%;padding:11px 16px;border:1.5px solid var(--bd);border-radius:999px;font-size:.95rem;font-family:inherit;color:var(--tx);background:var(--warm)}
.sinp:focus{outline:none;border-color:var(--nvy-m);background:var(--wh)}
.sinp::placeholder{color:var(--lt)}
.fpills{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.fpill{padding:5px 11px;border-radius:999px;font-size:.72rem;font-weight:600;border:1.5px solid var(--bd);background:var(--wh);color:var(--mt);cursor:pointer;font-family:inherit;white-space:nowrap}
.fpill.on{background:var(--nvy-d);color:#fff;border-color:var(--nvy-d)}
.fpill.fpx{border-color:var(--er);color:var(--er)}
.fexp{display:flex;gap:7px;margin-top:8px}
.fsel-sm{flex:1;padding:8px 10px;border:1.5px solid var(--bd);border-radius:10px;font-size:.78rem;font-family:inherit;color:var(--tx);background:var(--wh)}
/* LETZTER FANG */
.lf-wrap{padding:13px 13px 0}
.lf-hdr{font-size:.63rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--mt);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.lf-hdr::after{content:"";flex:1;height:1px;background:var(--bd)}
.lf-card{position:relative;border-radius:14px;overflow:hidden;height:160px;cursor:pointer;box-shadow:0 6px 20px rgba(0,20,10,.14)}
.lf-card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.lf-ph{position:absolute;inset:0;background:linear-gradient(135deg,var(--nvy-d),var(--nvy-m));display:flex;align-items:center;justify-content:center;font-size:52px}
.lf-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,8,22,.94) 0%,rgba(0,18,42,.15) 60%)}
.lf-badge{position:absolute;top:10px;left:12px;background:var(--gld-b);color:#fff;font-size:.58rem;font-weight:700;padding:2px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:.05em}
.lf-stars{position:absolute;top:10px;right:12px;color:var(--gld-b);font-size:.85rem}
.lf-c{position:absolute;bottom:0;left:0;right:0;padding:13px 15px;color:#fff}
.lf-fish{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;margin-bottom:4px}
.lf-meta{display:flex;flex-wrap:wrap;gap:9px;font-size:.78rem;color:rgba(255,255,255,.72)}
/* ENTRY CARDS */
.elist{padding:10px 13px 0;display:flex;flex-direction:column;gap:10px}
.ecard{border-radius:14px;overflow:hidden;cursor:pointer;position:relative;height:138px;box-shadow:0 2px 8px rgba(0,20,10,.09)}
.ecard img,.ec-ph{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.ec-ph{display:flex;align-items:center;justify-content:center;font-size:42px;background:linear-gradient(135deg,var(--nvy-d),var(--nvy-m))}
.ec-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,8,22,.9) 0%,rgba(0,18,42,.1) 60%)}
.ec-date{position:absolute;top:9px;left:11px;background:rgba(0,8,22,.62);color:rgba(255,255,255,.9);font-size:.61rem;font-weight:600;padding:2px 8px;border-radius:999px}
.ec-stars{position:absolute;top:9px;right:11px;color:var(--gld-b);font-size:.77rem}
.ec-c{position:absolute;bottom:0;left:0;right:0;padding:10px 13px;color:#fff}
.ec-t{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;line-height:1.2;margin-bottom:3px}
.ec-m{font-size:.78rem;color:rgba(255,255,255,.68);display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{font-size:.72rem;font-weight:600;padding:3px 9px;border-radius:999px;background:rgba(255,255,255,.18);color:rgba(255,255,255,.92)}
.tag-f{background:rgba(26,107,60,.75)}.tag-w{background:rgba(160,100,0,.72)}
/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;padding:50px 22px;text-align:center;gap:12px}
.empty-ico{font-size:52px;opacity:.28}
.empty-t{font-family:'Playfair Display',serif;font-size:1.22rem;font-weight:700}
.empty-s{color:var(--mt);font-size:.83rem;max-width:240px;line-height:1.65}
/* HDR */
.hdr{background:var(--nvy-d);color:#fff;display:flex;align-items:center;gap:10px;padding:0 13px;height:52px;flex-shrink:0}
.hdr-back{background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:.79rem;font-family:inherit;padding:5px 2px;white-space:nowrap}
.hdr-t{flex:1;font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-act{background:var(--gld-b);color:#fff;border:none;cursor:pointer;font-size:.77rem;font-weight:700;padding:6px 14px;border-radius:999px;font-family:inherit}
/* WX */
.wx-banner{background:linear-gradient(135deg,var(--nvy-d),var(--nvy-m));border-radius:13px;padding:13px 15px;color:#fff;display:flex;align-items:center;gap:11px;cursor:pointer}
.wx-result{background:var(--warm2);border:1px solid var(--bd);border-radius:13px;padding:12px 14px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.wx-val{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;color:var(--nvy-d);text-align:center}
.wx-lbl{font-size:.6rem;color:var(--mt);text-align:center;margin-top:1px}
/* FORM */
.fs{display:flex;flex-direction:column;gap:12px;padding:12px 0 0}
.fsec{background:var(--wh);border-radius:13px;overflow:hidden;box-shadow:0 2px 8px rgba(0,20,10,.09);border:1px solid var(--bd)}
.fsec-h{padding:10px 15px;background:#ddd6c8;font-size:.75rem;font-weight:800;color:#001530;text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid #c0b8ac}
.ff{padding:13px 14px;display:flex;flex-direction:column;gap:10px}
.fg{display:flex;flex-direction:column;gap:3px}
.fl{font-size:.75rem;font-weight:800;color:#3a4a3c;text-transform:uppercase;letter-spacing:.04em}
.fi,.fse,.fta{width:100%;padding:11px 13px;border:2px solid #b0a89c;border-radius:10px;font-size:1rem;font-family:inherit;color:#111;background:#fff;-webkit-appearance:none;font-weight:500}
.fi:focus,.fse:focus,.fta:focus{outline:none;border-color:var(--nvy-m)}
.fi::placeholder,.fta::placeholder{color:#8a9a8c;font-weight:400}
.fta{min-height:100px;resize:vertical;line-height:1.6}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.fgps{display:flex;gap:7px}.fgps .fi{flex:1}
.gps-b{padding:10px 12px;border:1.5px solid var(--nvy-m);background:var(--nvy-l);border-radius:10px;font-size:.78rem;font-weight:700;color:var(--nvy-d);cursor:pointer;white-space:nowrap;font-family:inherit}
/* MULTI-SELECT CHIPS */
.chip-wrap{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.chip{padding:6px 12px;border-radius:999px;font-size:.8rem;font-weight:600;border:1.5px solid var(--bd);background:var(--warm);color:var(--mt);cursor:pointer;font-family:inherit;user-select:none;display:flex;align-items:center;gap:5px}
.chip:hover{border-color:var(--nvy-m);color:var(--nvy-d)}
.chip.sel{background:var(--nvy-d);color:#fff;border-color:var(--nvy-d)}
.chip.sel .chip-x{opacity:.7}
.chip-add{padding:6px 12px;border-radius:999px;font-size:.8rem;font-weight:600;border:1.5px dashed var(--bd);background:none;color:var(--nvy-m);cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px}
.chip-add:hover{background:var(--nvy-l);border-color:var(--nvy-m)}
/* RUTEN */
.ruten-wrap{display:flex;gap:8px}
.ruten-btn{width:42px;height:42px;border-radius:50%;border:1.5px solid var(--bd);background:var(--warm);color:var(--mt);font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit}
.ruten-btn.sel{background:var(--nvy-d);color:#fff;border-color:var(--nvy-d)}
/* FANG */
.fang-header{display:grid;grid-template-columns:1fr 70px 70px 28px;gap:6px;margin-bottom:2px}
.fang-header span{font-size:.62rem;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.04em}
.fang-row{display:grid;grid-template-columns:1fr 70px 70px 28px;gap:6px;align-items:center}
.fi-sm{padding:9px 8px;border:1.5px solid var(--bd);border-radius:10px;font-size:.85rem;font-family:inherit;color:var(--tx);background:var(--wh);width:100%;text-align:center}
.fi-sm:focus{outline:none;border-color:var(--nvy-m)}
.fi-sm::placeholder{color:var(--lt);font-size:.75rem}
.fang-rm{width:28px;height:36px;border:none;background:none;color:var(--lt);cursor:pointer;font-size:16px;border-radius:6px}
.fang-rm:hover{color:var(--er);background:#fee2e2}
.plus-btn{display:flex;align-items:center;gap:8px;padding:9px 12px;border:1.5px dashed var(--bd);border-radius:10px;color:var(--nvy-m);cursor:pointer;font-size:.83rem;font-weight:600;font-family:inherit;background:none;width:100%}
.plus-btn:hover{background:var(--nvy-l);border-color:var(--nvy-m)}
/* FOTO */
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.pit{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden}
.pit img{width:100%;height:100%;object-fit:cover}
.pit-rm{position:absolute;top:3px;right:3px;width:20px;height:20px;background:rgba(0,0,0,.65);color:#fff;border:none;border-radius:50%;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.padd{aspect-ratio:1;border:2px dashed var(--bd);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--mt);font-size:.63rem;cursor:pointer;background:var(--warm)}
.padd:hover{border-color:var(--nvy-m);background:var(--nvy-l)}
.sbtn{width:100%;padding:13px;background:var(--nvy-d);color:#fff;border:none;border-radius:13px;font-size:.94rem;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px}
.sbtn:hover{background:var(--nvy-m)}
.stars-row{display:flex;gap:2px}
.star-btn{font-size:26px;background:none;border:none;cursor:pointer;padding:1px;line-height:1}
/* DETAIL */
.dh{height:200px;background:var(--nvy-d);position:relative;overflow:hidden;flex-shrink:0}
.dh img{width:100%;height:100%;object-fit:cover;opacity:.82;cursor:pointer}
.dh-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:64px;background:linear-gradient(135deg,var(--nvy-d),var(--nvy-m))}
.dh-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,8,22,.92) 0%,transparent 50%)}
.dh-m{position:absolute;bottom:13px;left:15px;right:15px;color:#fff}
.dh-t{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:800;line-height:1.2}
.dh-d{font-size:.73rem;opacity:.7;margin-top:2px}
.din{padding:12px 13px 0;display:flex;flex-direction:column;gap:10px}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.di{background:var(--wh);border:1px solid var(--bd);border-radius:10px;padding:10px 12px}
.di-full{grid-column:1/-1}.di-catch{background:#e8f5ee;border-color:#b8dfc9}
.di-lb{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--mt);margin-bottom:3px}
.di-lb-c{color:var(--ok)}.di-v{font-size:.97rem;font-weight:600}
.catch-tbl{width:100%;border-collapse:collapse}
.catch-tbl th{font-size:.62rem;font-weight:700;text-transform:uppercase;color:var(--mt);text-align:left;padding:2px 6px 5px}
.catch-tbl td{font-size:.88rem;font-weight:600;padding:4px 6px;border-top:1px solid var(--warm2)}
.gal{display:grid;grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:7px}
.gi{aspect-ratio:1;border-radius:10px;overflow:hidden;cursor:pointer}
.gi img{width:100%;height:100%;object-fit:cover}
/* SETTINGS */
.sh{background:linear-gradient(135deg,var(--nvy-d),var(--nvy-m));padding:22px 16px 18px;color:#fff;flex-shrink:0}
.sh-t{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:800;margin-bottom:3px}
.srow{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:13px 13px 0}
.sc{background:var(--wh);border:1px solid var(--bd);border-radius:13px;padding:14px;text-align:center}
.sn{font-family:'Playfair Display',serif;font-size:2rem;font-weight:800;color:var(--nvy-d)}
.sl{font-size:.7rem;color:var(--mt);margin-top:2px}
.ssec{background:var(--wh);border-radius:13px;overflow:hidden;border:1px solid var(--bd);margin:12px 13px 0}
.ssec-h{padding:9px 14px;background:var(--warm2);font-size:.68rem;font-weight:700;color:var(--nvy-d);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--bd)}
.ssi{display:flex;align-items:center;gap:11px;padding:12px 14px;border-bottom:1px solid var(--bd);cursor:pointer}
.ssi:last-child{border-bottom:none}.ssi:hover{background:var(--warm)}
.ssi-ico{font-size:19px;width:26px;text-align:center}
.ssi-tx{flex:1}.ssi-lb{font-weight:600;font-size:.87rem}.ssi-d{font-size:.71rem;color:var(--mt);margin-top:1px}
.cprev{width:100%;height:180px;object-fit:cover;object-position:center 35%;display:block;border-radius:0}
/* OVERLAYS */
.backdrop{position:fixed;inset:0;background:rgba(0,10,20,.66);backdrop-filter:blur(5px);z-index:150;display:flex;align-items:flex-end;justify-content:center;padding:14px}
.dialog{background:var(--wh);border-radius:18px 18px 12px 12px;padding:24px 20px;width:100%;max-width:440px;display:flex;flex-direction:column;gap:11px}
.dialog-t{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700}
.dialog-x{color:var(--mt);font-size:.86rem}
.dialog-a{display:flex;gap:9px;margin-top:4px}
.dialog-a button{flex:1;padding:12px;border-radius:13px;font-weight:700;font-size:.87rem;cursor:pointer;font-family:inherit;border:none}
.btn-no{background:var(--warm2);color:var(--tx)}.btn-ok{background:var(--er);color:#fff}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:200;display:flex;align-items:center;justify-content:center;padding:14px}
.lightbox img{max-width:100%;max-height:90vh;border-radius:10px}
.lb-x{position:absolute;top:13px;right:13px;background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:50%;width:36px;height:36px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.toast-wrap{position:fixed;bottom:calc(var(--nav)+14px);left:50%;transform:translateX(-50%);z-index:180;display:flex;flex-direction:column;align-items:center;gap:7px;pointer-events:none}
.toast{background:var(--tx);color:#fff;padding:8px 20px;border-radius:999px;font-size:.8rem;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.3);white-space:nowrap}
.toast.ok{background:var(--ok)}.toast.er{background:var(--er)}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"></div>
<script>
// STORAGE
const DB={get(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}},set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}};
const SK='ang-v3',SS='ang-v3-s';
function loadE(){
  let data=DB.get(SK);
  if(!data||!data.length){
    // Migration: alte Daten aus früheren Versionen übernehmen
    const oldKeys=['at-entries2','at-entries'];
    for(const k of oldKeys){
      const old=DB.get(k);
      if(old&&old.length){DB.set(SK,old);return old;}
    }
  }
  return data||[];
}
function saveE(e){DB.set(SK,e)}
function loadS(){return DB.get(SS)||{}}function savS(s){DB.set(SS,s)}

// WETTER
const WMO={0:"sonnig",1:"sonnig",2:"wechselhaft",3:"bewölkt",45:"nebelig",48:"nebelig",51:"regnerisch",61:"regnerisch",63:"regnerisch",65:"regnerisch",80:"regnerisch",81:"regnerisch",95:"stürmisch"};
async function fetchWetter(lat,lon){try{const d=await(await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat.toFixed(4)}&longitude=${lon.toFixed(4)}&current=temperature_2m,relative_humidity_2m,weather_code,surface_pressure,wind_speed_10m&wind_speed_unit=kmh&timezone=auto`)).json();const c=d.current;const k=c.wind_speed_10m;return{temperatur:Math.round(c.temperature_2m),luftfeuchtigkeit:Math.round(c.relative_humidity_2m),luftdruck:Math.round(c.surface_pressure),wind:k<5?"windstill":k<20?"schwach":k<40?"mittel":k<65?"stark":"stürmisch",wetter:WMO[c.weather_code]||"wechselhaft",wind_kmh:Math.round(k)}}catch{return null}}

// GEWÄSSER via OpenStreetMap Overpass API
async function fetchGewässer(lat, lon) {
  try {
    // Suche Gewässer im Umkreis von 500m
    const query = `[out:json][timeout:10];
(
  way["natural"="water"]["name"](around:500,${lat},${lon});
  relation["natural"="water"]["name"](around:500,${lat},${lon});
  way["waterway"~"river|stream|canal"]["name"](around:500,${lat},${lon});
  way["leisure"="marina"]["name"](around:500,${lat},${lon});
);
out tags 1;`;
    const r = await fetch("https://overpass-api.de/api/interpreter", {
      method: "POST",
      body: "data=" + encodeURIComponent(query)
    });
    const d = await r.json();
    if (d.elements && d.elements.length > 0) {
      // Bevorzuge größere Gewässer (Seen vor Bächen)
      const prio = ["natural", "leisure", "waterway"];
      d.elements.sort((a,b) => {
        const ta = prio.indexOf(Object.keys(a.tags).find(k=>prio.includes(k))||"");
        const tb = prio.indexOf(Object.keys(b.tags).find(k=>prio.includes(k))||"");
        return ta - tb;
      });
      return d.elements[0].tags.name || null;
    }
    return null;
  } catch { return null; }
}

async function autoWX(){
  S.wxL=true;
  const wxWrap=document.getElementById('wx-wrap');
  if(wxWrap)wxWrap.innerHTML=`<div class="wx-banner" style="opacity:.65"><span style="font-size:22px">⏳</span><div style="flex:1"><strong style="font-size:.87rem;display:block;margin-bottom:2px">Lade Standort & Wetter…</strong><span style="font-size:.7rem;color:rgba(255,255,255,.55)">Einen Moment bitte…</span></div></div>`;

  async function applyWetter(lat,lon,source){
    const wx=await fetchWetter(lat,lon);
    if(wx){
      const setV=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v};
      const gpsStr=lat.toFixed(4)+', '+lon.toFixed(4);
      setV('fgps',gpsStr);setV('f-temp2',wx.temperatur);setV('f-ldruck',wx.luftdruck);
      setV('f-feuchte',wx.luftfeuchtigkeit);setV('f-wkmh',wx.wind_kmh);
      setV('f-wetter',wx.wetter);setV('f-wind',wx.wind);
      Object.assign(S.form,wx,{gps_text:gpsStr});
      // Karten-URL speichern
      S.form.map_url = getMapUrl(lat, lon);
      S.form.map_lat = lat;
      S.form.map_lon = lon;
      S.wx=true;S.wxL=false;
      // Gewässer-Name automatisch ermitteln (parallel, kein Warten)
      fetchGewässer(lat, lon).then(name => {
        if (name) {
          const el = document.getElementById('fg');
          if (el && !el.value) {
            el.value = name;
            S.form.gewässer = name;
          }
          toast('📍 Gewässer erkannt: ' + name, 'ok');
        }
      });
      if(wxWrap)wxWrap.innerHTML='<div class="wx-result"><div><div class="wx-val">'+wx.temperatur+'°C</div><div class="wx-lbl">Temperatur</div></div><div><div class="wx-val">'+wx.luftdruck+' hPa</div><div class="wx-lbl">Luftdruck</div></div><div><div class="wx-val">'+wx.luftfeuchtigkeit+'%</div><div class="wx-lbl">Luftfeuchte</div></div></div>';
      const wt=document.getElementById('wt');if(wt)wt.textContent='🌤️ Wetterdaten · automatisch geladen ✓';
      toast(source+': '+(WE[wx.wetter]||'🌤️')+' '+wx.temperatur+'°C · '+wx.luftdruck+' hPa',"ok");
    } else {
      S.wxL=false;toast("Wetterdaten nicht verfügbar","er");
      if(wxWrap)wxWrap.innerHTML=buildWxBanner();
    }
  }

  async function ipFallback(){
    // Mehrere Dienste nacheinander probieren (CORS-freundlich)
    const services=[
      async()=>{const d=await(await fetch('https://ipwho.is/')).json();if(d.success&&d.latitude)return{lat:d.latitude,lon:d.longitude};throw new Error()},
      async()=>{const d=await(await fetch('https://freeipapi.com/api/json')).json();if(d.latitude)return{lat:d.latitude,lon:d.longitude};throw new Error()},
      async()=>{const d=await(await fetch('https://ipapi.co/json/')).json();if(d.latitude)return{lat:parseFloat(d.latitude),lon:parseFloat(d.longitude)};throw new Error()},
    ];
    for(const svc of services){
      try{
        const{lat,lon}=await svc();
        await applyWetter(lat,lon,'🌐 Standort (ca. via IP)');
        return;
      }catch{continue}
    }
    S.wxL=false;
    toast("Standort nicht ermittelbar — Wetter bitte manuell eintragen","er");
    if(wxWrap)wxWrap.innerHTML=buildWxBanner();
  }

  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      async pos=>{await applyWetter(pos.coords.latitude,pos.coords.longitude,'📍 GPS')},
      async ()=>{await ipFallback()},
      {timeout:8000,maximumAge:600000,enableHighAccuracy:false}
    );
  } else {
    await ipFallback();
  }
}

function autoBackup(){
  try {
    const datum = new Date().toISOString().slice(0,10);
    const data = JSON.stringify({
      version:'1.0',
      exportDatum: new Date().toISOString(),
      anzahl: S.entries.length,
      eintraege: S.entries
    }, null, 2);
    const blob = new Blob([data], {type:'application/json'});
    const u = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = u;
    a.download = `angeltagebuch-backup-${datum}.json`;
    a.click();
    URL.revokeObjectURL(u);
    S.settings.letztesSicherung = new Date().toISOString();
    S.settings.letzterBackupCount = S.entries.length;
    savS(S.settings);
    console.log('Auto-Backup erstellt:', datum, S.entries.length, 'Einträge');
  } catch(e) {
    console.warn('Auto-Backup fehlgeschlagen:', e);
  }
}

function restoreBackup(input){
  const file = input.files?.[0];
  if(!file)return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if(!data.eintraege||!Array.isArray(data.eintraege))throw new Error();
      const existingIds = new Set(S.entries.map(e=>e.id));
      const neu = data.eintraege.filter(e=>!existingIds.has(e.id));
      S.entries = [...S.entries,...neu].sort((a,b)=>b.datum.localeCompare(a.datum));
      saveE(S.entries);
      toast(`✅ ${neu.length} Einträge aus Backup importiert!`,'ok');
      render();
    } catch { toast('Ungültige Backup-Datei','er') }
  };
  reader.readAsText(file);
  input.value='';
}

// ── PERSÖNLICHE REKORDE ──────────────────────────────────────────────────
function calcStats(){
  const es = S.entries;
  if(!es.length) return null;

  // Artenbuch
  const artenbuch = {};
  es.forEach(e=>{
    (e.catches||[]).filter(c=>c.fischart).forEach(c=>{
      if(!artenbuch[c.fischart]) artenbuch[c.fischart]={anzahl:0,max_laenge:0};
      artenbuch[c.fischart].anzahl++;
      const l = parseFloat(c.laenge)||0;
      if(l > artenbuch[c.fischart].max_laenge) artenbuch[c.fischart].max_laenge = l;
    });
  });

  // Größter Fisch
  let groessterFisch = null;
  es.forEach(e=>{
    (e.catches||[]).filter(c=>c.fischart&&c.laenge).forEach(c=>{
      if(!groessterFisch || parseFloat(c.laenge)>parseFloat(groessterFisch.laenge)){
        groessterFisch = {...c, datum:e.datum, gewässer:e.gewässer};
      }
    });
  });

  // Meiste Fänge an einem Tag
  let bestTag = null;
  es.forEach(e=>{
    const n=(e.catches||[]).filter(c=>c.fischart).length;
    if(!bestTag || n>bestTag.anzahl) bestTag={anzahl:n,datum:e.datum,gewässer:e.gewässer};
  });

  // Top-Köder
  const köderCount = {};
  es.forEach(e=>{
    (e.ruten||[]).forEach(r=>{
      (r.köder||[]).forEach(k=>{
        köderCount[k]=(köderCount[k]||0)+1;
      });
    });
  });
  const topKöder = Object.entries(köderCount).sort((a,b)=>b[1]-a[1]).slice(0,3);

  // Top-Gewässer
  const gwCount = {};
  es.forEach(e=>{ if(e.gewässer) gwCount[e.gewässer]=(gwCount[e.gewässer]||0)+1; });
  const topGwässer = Object.entries(gwCount).sort((a,b)=>b[1]-a[1]).slice(0,3);

  // Gesamtfänge
  const gesamtFänge = es.reduce((s,e)=>(e.catches||[]).filter(c=>c.fischart).length+s, 0);

  return { artenbuch, groessterFisch, bestTag, topKöder, topGwässer, gesamtFänge,
           anzahlAusflüge: es.length, anzahlArten: Object.keys(artenbuch).length };
}

// Bundesland aus GPS-Koordinaten ermitteln (grobe Bounding Boxes)
function bundeslandFromGPS(lat, lon) {
  if (!lat || !lon) return 'default';
  // Grobe Zuordnung nach Koordinaten
  if (lat > 53.5 && lon > 10.5) return 'MV';  // Mecklenburg-Vorpommern
  if (lat > 52.5 && lon < 11.5 && lat < 54.0) return 'NI';  // Niedersachsen/HH
  if (lat < 49.5 && lon > 10.0) return 'BY';   // Bayern
  return 'default';
}

// Aktuelle Regeln für einen Fisch holen
function getFischRegel(fischart, lat, lon) {
  const bl = bundeslandFromGPS(lat, lon);
  const regeln = FISCHREGELN[bl] || FISCHREGELN['default'];
  return regeln[fischart] || FISCHREGELN['default'][fischart] || null;
}

// Prüfe ob aktuell Schonzeit
function istSchonzeit(regel) {
  if (!regel || !regel.schonzeit || !regel.schonzeit.length) return false;
  const monat = new Date().getMonth() + 1; // 1-12
  return regel.schonzeit.includes(monat);
}

const MINDESTMASS = {
  'Hecht':45,'Zander':45,'Barsch':20,'Aal':35,'Karpfen':35,
  'Schleie':25,'Brassen':25,'Rotauge':18,'Forelle':25,'Lachs':50,
  'Wels':60,'Döbel':25
};
const SELTENHEIT = {
  'Wels':3,'Lachs':3,'Aal':2,'Forelle':1.5,'Zander':1.5,'Hecht':1.2
};

function berechnePunkte(fischart, laenge){
  const l = parseFloat(laenge)||0;
  const mm = MINDESTMASS[fischart]||20;
  if(l < mm) return 0; // Unter Mindestmaß = 0 Punkte
  const basis = 10;
  const bonusCm = Math.max(0, l-mm) * 1.5;
  const selten = SELTENHEIT[fischart]||1;
  return Math.round((basis + bonusCm) * selten);
}

function calcGesamtPunkte(){
  let total = 0;
  S.entries.forEach(e=>{
    (e.catches||[]).filter(c=>c.fischart&&c.laenge).forEach(c=>{
      total += berechnePunkte(c.fischart, c.laenge);
    });
  });
  return total;
}

    <div class="fg"><label class="fl">Angelplatz / Spot</label><input type="text" class="fi" id="fs" value="${f.spot}" placeholder="z.B. Nordstrand, Steg 3, Bootsanleger"/></div>

      <label class="fl">Mit dabei</label>
      <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:7px;" id="mit-chips">${buildMitChips()}</div>

        <button type="button" onclick="addMitCustom()" style="padding:10px 14px;background:var(--nvy-d);color:#fff;border:none;border-radius:10px;font-size:.85rem;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;">＋</button>
      </div>
    </div>

  </div></div>
  <div class="fsec"><div class="fsec-h" id="wt">🌤️ Wetterdaten</div><div class="ff">
    <div class="fr2">
      <div class="fg"><label class="fl">Wetterlage</label><select class="fse" id="f-wetter">${["sonnig","bewölkt","wechselhaft","regnerisch","nebelig","stürmisch"].map(w=>`<option value="${w}"${f.wetter===w?' selected':''}>${w[0].toUpperCase()+w.slice(1)}</option>`).join('')}</select></div>
      <div class="fg"><label class="fl">Wind</label><select class="fse" id="f-wind">${["windstill","schwach","mittel","stark","stürmisch"].map(w=>`<option value="${w}"${f.wind===w?' selected':''}>${w[0].toUpperCase()+w.slice(1)}</option>`).join('')}</select></div>
    </div>
    <div class="fr3">
      <div class="fg"><label class="fl">Temp. °C</label><input type="number" class="fi" id="f-temp2" value="${f.temperatur}" placeholder="z.B. 16"/></div>
      <div class="fg"><label class="fl">Luftdruck hPa</label><input type="number" class="fi" id="f-ldruck" value="${f.luftdruck}" placeholder="z.B. 1013"/></div>
      <div class="fg"><label class="fl">Luftfeuchte %</label><input type="number" class="fi" id="f-feuchte" value="${f.luftfeuchtigkeit}" placeholder="z.B. 72"/></div>
    </div>
    <div class="fg"><label class="fl">Wind km/h</label><input type="number" class="fi" id="f-wkmh" value="${f.wind_kmh}" placeholder="z.B. 15"/></div>
  </div></div>
  <div class="fsec"><div class="fsec-h">🎣 Ausrüstung & Ruten</div><div class="ff">
    <div class="fg"><label class="fl">Anzahl Ruten</label>
      <div class="ruten-wrap" id="ruten-row">${buildRuten()}</div>
      <div style="font-size:.67rem;color:var(--mt);margin-top:4px">Tippe auf eine Zahl — danach erscheinen die Felder pro Rute</div>
    </div>
    <div id="ruten-detail">${buildRutenDetail()}</div>
  </div></div>
  <div class="fsec"><div class="fsec-h">🐟 Fänge</div><div class="ff"><div id="c-wrap">${buildCatches()}</div></div></div>
  <div class="fsec"><div class="fsec-h">📷 Fotos · Fang, Gewässer & Umgebung</div><div class="ff"><div id="p-wrap">${buildPhotos()}</div></div></div>
  <div class="fsec"><div class="fsec-h">📝 Notizen & Bewertung</div><div class="ff">
    <div class="fg"><label class="fl">Notizen</label><textarea class="fta" id="fn" placeholder="Besonderheiten beim Fangtag, Stimmung, Tipps fürs nächste Mal, Uhrzeit des Fangangs…">${f.notizen||''}</textarea></div>
    <div class="fg"><label class="fl">Tagesbewertung</label><div class="stars-row" id="st-row">${buildSt()}</div></div>
  </div></div>
  <button class="sbtn" onclick="save()">${isE?'✓ Änderungen speichern':'💾 Eintrag speichern'}</button>
  <div style="text-align:center;font-size:.66rem;color:var(--mt);margin-top:5px">💾 Lokal auf diesem Gerät gespeichert</div>
  </div>`;
  page.appendChild(pi);app.appendChild(page);
}

// DETAIL
function rDetail(app){
  const e=S.entries.find(x=>x.id===S.id);if(!e){go('home');return}
  const hdr=document.createElement('header');hdr.className='hdr';
  hdr.innerHTML=`<button class="hdr-back" onclick="go('home')">← Zurück</button><div class="hdr-t">${e.gewässer||'Angelausflug'}</div><button class="hdr-act" onclick="go('edit','${e.id}')">✏️ Bearbeiten</button>`;
  app.appendChild(hdr);
  const page=document.createElement('div');page.className='page';
  const dh=document.createElement('div');dh.className='dh';
  dh.innerHTML=e.fotos?.[0]?`<img src="${e.fotos[0]}" alt="" onclick="S.lb='${e.fotos[0]}';render()"/><div class="dh-ov"></div>`:`<div class="dh-ph">🎣</div>`;
  const sessionInfo=(()=>{
    if(!e.session_start)return e.uhrzeit?(' · '+e.uhrzeit+' Uhr'):'';
    let txt=' · '+e.session_start+' Uhr';
    if(e.session_end){
      txt+=' – '+e.session_end+' Uhr';
      const [sh,sm]=e.session_start.split(':').map(Number);
      const [eh,em]=e.session_end.split(':').map(Number);
      const mins=(eh*60+em)-(sh*60+sm);
      if(mins>0)txt+=' ('+Math.floor(mins/60)+'h '+(mins%60)+'min)';
    }
    return txt;
  })();
  dh.innerHTML+=`<div class="dh-m"><div class="dh-t">${e.gewässer||'Angelausflug'}${e.spot?' · '+e.spot:''}</div><div class="dh-d">${fmtD(e.datum)}${sessionInfo}</div></div>`;
  page.appendChild(dh);
  const din=document.createElement('div');din.className='din';
  // Punkte berechnen
  const entryPunkte = (e.catches||[]).filter(c=>c.fischart&&c.laenge).reduce((s,c)=>s+berechnePunkte(c.fischart,c.laenge),0);
  const sternePunkte = `<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
    ${e.tagesbewertung>0?`<div style="display:flex;align-items:center;gap:9px"><span style="color:var(--gld-b);font-size:1.15rem;letter-spacing:2px">${'★'.repeat(e.tagesbewertung)}${'☆'.repeat(5-e.tagesbewertung)}</span><span style="font-size:.72rem;color:var(--mt)">Bewertung</span></div>`:''}
    ${entryPunkte>0?`<div style="background:linear-gradient(135deg,#c8921a,#daa520);color:#fff;border-radius:999px;padding:4px 13px;font-size:.82rem;font-weight:700;">🏆 ${entryPunkte} Punkte</div>`:''}
  </div>`;
  if(e.tagesbewertung>0||entryPunkte>0) din.innerHTML+=sternePunkte;
  const dg=document.createElement('div');dg.className='dgrid';
  const dr=(lb,v,cls='')=>{if(!v&&v!==0)return;dg.innerHTML+=`<div class="di ${cls}"><div class="di-lb">${lb}</div><div class="di-v">${v}</div></div>`};
  dr('Wetter',e.wetter&&`${WE[e.wetter]||'🌤️'} ${e.wetter}`);
  dr('Temperatur',e.temperatur!==''&&e.temperatur!==undefined&&`🌡️ ${e.temperatur} °C`);
  dr('Luftdruck',e.luftdruck!==''&&e.luftdruck!==undefined&&`🌬️ ${e.luftdruck} hPa`);
  dr('Luftfeuchtigkeit',e.luftfeuchtigkeit!==''&&e.luftfeuchtigkeit!==undefined&&`💧 ${e.luftfeuchtigkeit} %`);
  dr('Wind',e.wind&&`💨 ${WL[e.wind]||e.wind}${e.wind_kmh>0?` · ${e.wind_kmh} km/h`:''}`);
  dr('Mit dabei',e.begleitperson&&`👤 ${e.begleitperson}`);
  if(e.anzahl_ruten)dr('Ruten',`🎣 ${e.anzahl_ruten} Rute${e.anzahl_ruten>1?'n':''}`);
  if((e.ruten&&e.ruten.length)){
    // Ruten-Detail anzeigen
    din.innerHTML+=`<div><div style="font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--nvy-d);margin-bottom:6px">🎣 Ruten (${e.ruten.length})</div>${e.ruten.map((r,i)=>`<div style="background:var(--warm2);border-radius:8px;padding:9px 12px;margin-bottom:5px;border:1px solid var(--bd);"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;"><span style="font-size:.72rem;font-weight:800;color:var(--nvy-d);text-transform:uppercase;letter-spacing:.04em">Rute ${i+1}</span>${r.methode?`<span style="font-size:.72rem;background:var(--nvy-l);color:var(--nvy-d);padding:2px 8px;border-radius:999px;font-weight:600;">${r.methode}${r.tiefe?` · ${r.tiefe}cm`:''}</span>`:''}</div><div style="font-size:.88rem;font-weight:600;color:#1c2a1e;">🎯 ${r.zielfisch_custom||r.zielfisch||'–'}</div>
          <div style="font-size:.82rem;color:var(--mt);margin-top:2px;">🪝 ${(r.köder||[]).length?(r.köder.join(', ')+(r.köder_sonstige?' + '+r.köder_sonstige:'')):'Kein Köder angegeben'}</div>  </div>`).join('')}</div>`;
  } else {
    if((e.zielfische||[]).length)dg.innerHTML+=`<div class="di di-full"><div class="di-lb">🎯 Zielfische</div><div class="di-v">${e.zielfische.join(' · ')}</div></div>`;
    if((e.köder||[]).length)dg.innerHTML+=`<div class="di di-full"><div class="di-lb">🪝 Köder</div><div class="di-v">${e.köder.join(' · ')}</div></div>`;
  }
  din.appendChild(dg);
  const cs=(e.catches||[]).filter(c=>c.fischart);
  // Wetter-Zeitlinie anzeigen
  const wxStart=e.temperatur?{temp:e.temperatur,druck:e.luftdruck,wind:e.wind_kmh,wetter:e.wetter,zeit:e.session_start||e.uhrzeit}:null;
  const wxFaenge=(e.catches||[]).filter(c=>c.fischart&&c.wx_temp);
  const wxEnd=e.wx_end;
  if(wxStart||wxFaenge.length||wxEnd){
    let timeline='<div style="display:flex;flex-direction:column;gap:5px;">';
    if(wxStart) timeline+='<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:#e8f5ee;border-radius:8px;font-size:.8rem;"><span style="font-weight:700;color:#1a6b3c;min-width:36px;">'+(wxStart.zeit||'–')+'</span><span style="background:#1a6b3c;color:#fff;padding:2px 7px;border-radius:999px;font-size:.7rem;font-weight:700;">START</span><span>🌡️ '+wxStart.temp+'°C · 🌬️ '+(wxStart.druck||'–')+' hPa</span></div>';
    wxFaenge.forEach((c,i)=>{
      const prev=i===0?(wxStart?.druck):wxFaenge[i-1]?.wx_druck;
      const diff=prev&&c.wx_druck?(c.wx_druck-prev):null;
      const arrow=diff===null?'':diff>0?' ↑'+diff:'↓'+Math.abs(diff);
      timeline+='<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:#dce9f8;border-radius:8px;font-size:.8rem;"><span style="font-weight:700;color:#002855;min-width:36px;">'+(c.wx_zeit||'–')+'</span><span style="background:#002855;color:#fff;padding:2px 7px;border-radius:999px;font-size:.7rem;font-weight:700;">🐟 '+c.fischart+'</span><span>🌡️ '+c.wx_temp+'°C · 🌬️ '+(c.wx_druck||'–')+' hPa<span style="color:'+(diff<0?'#1a6b3c':diff>0?'#b0291e':'#6a7862')+';font-weight:700;margin-left:4px;">'+arrow+'</span></span></div>';
    });
    if(wxEnd) timeline+='<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:#ece6d8;border-radius:8px;font-size:.8rem;"><span style="font-weight:700;color:#5c4000;min-width:36px;">'+(wxEnd.zeit||'–')+'</span><span style="background:#c8921a;color:#fff;padding:2px 7px;border-radius:999px;font-size:.7rem;font-weight:700;">ENDE</span><span>🌡️ '+wxEnd.temp+'°C · 🌬️ '+(wxEnd.druck||'–')+' hPa</span></div>';
    timeline+='</div>';
    din.innerHTML+='<div><div style="font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--mt);margin-bottom:6px;">📈 Wetter-Verlauf</div>'+timeline+'</div>';
  }

  if(cs.length)din.innerHTML+=`<div><div style="font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ok);margin-bottom:5px">🐟 Fänge (${cs.length})</div><div class="di di-full di-catch"><table class="catch-tbl"><tr><th>Fischart</th><th>Länge</th><th>Gewicht</th><th>Wetter</th></tr>${cs.map(c=>{
  const ruten=e.ruten||[];
  const rute=c.rute_idx!=null?ruten[c.rute_idx]:null;
  const ruteInfo=rute?`<br/><span style="font-size:.72rem;color:var(--mt);">Rute ${parseInt(c.rute_idx)+1}: ${rute.zielfisch_custom||rute.zielfisch||''} · ${(rute.köder||[]).join(', ')||''}${rute.methode?' · '+rute.methode:''}</span>`:'';
  const wxInfo=c.wx_temp?`🌡️${c.wx_temp}° ${c.wx_druck?c.wx_druck+'hPa':''}${c.wx_zeit?' '+c.wx_zeit:''}`:' – ';
  return`<tr><td>${c.fischart}${ruteInfo}</td><td>${c.laenge?c.laenge+' cm':'–'}</td><td>${c.gewicht?c.gewicht+' kg':'–'}</td><td style="font-size:.75rem">${wxInfo}</td></tr>`;
}).join('')}</table></div></div>`;
  if(e.gps_text||e.map_url){
  let mapHtml = '';
  if(e.map_url){
    mapHtml = `<div style="margin-top:7px;border-radius:8px;overflow:hidden;border:1px solid var(--bd);">
      <img src="${e.map_url}" alt="Kartenausschnitt" style="width:100%;height:auto;display:block;" loading="lazy"
        onerror="this.parentElement.innerHTML='<div style=\'padding:8px;font-size:.78rem;color:var(--mt);\'>🗺️ <a href=\'https://www.openstreetmap.org/?mlat=${e.map_lat}&mlon=${e.map_lon}&zoom=14\' target=\'_blank\' style=\'color:var(--nvy-m);\'>Karte öffnen ↗</a></div>'"/>
      <div style="padding:5px 8px;font-size:.68rem;color:var(--mt);background:var(--warm2);">
        📍 ${e.gps_text||''} · <a href="https://www.openstreetmap.org/?mlat=${e.map_lat}&mlon=${e.map_lon}&zoom=14" target="_blank" style="color:var(--nvy-m);font-weight:600;">In Karte öffnen ↗</a>
      </div>
    </div>`;
  } else {
    mapHtml = `<div style="font-size:.82rem;font-weight:400;color:var(--mt);margin-top:4px;">${e.gps_text}</div>`;
  }
  din.innerHTML+=`<div class="di di-full"><div class="di-lb">📍 Standort</div>${mapHtml}</div>`;
}
  if(e.notizen)din.innerHTML+=`<div><div style="font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--mt);margin-bottom:5px">📝 Notizen</div><div style="background:var(--wh);border:1px solid var(--bd);border-radius:10px;padding:13px;white-space:pre-wrap;font-size:.87rem;line-height:1.7">${e.notizen}</div></div>`;
  if((e.fotos?.length||0)>0)din.innerHTML+=`<div><div style="font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--mt);margin-bottom:5px">📷 Fotos (${e.fotos.length})</div><div class="gal">${e.fotos.map(src=>`<div class="gi"><img src="${src}" loading="lazy" onclick="S.lb='${src}';render()"/></div>`).join('')}</div></div>`;
  din.innerHTML+=`<div style="background:var(--warm2);border-radius:10px;padding:10px 13px;font-size:.7rem;color:var(--mt)">💾 Lokal${e.createdAt?' · '+new Date(e.createdAt).toLocaleString('de-DE'):''}</div>`;
  din.innerHTML+=`<div style="display:flex;gap:9px;padding-bottom:14px"><button onclick="go('edit','${e.id}')" style="flex:1;padding:11px;background:var(--wh);color:var(--nvy-d);border:1.5px solid var(--bd);border-radius:13px;font-weight:700;font-size:.85rem;cursor:pointer;font-family:inherit">✏️ Bearbeiten</button><button onclick="S.del=true;render()" style="flex:1;padding:11px;background:var(--er);color:#fff;border:none;border-radius:13px;font-weight:700;font-size:.85rem;cursor:pointer;font-family:inherit">🗑 Löschen</button></div>`;
  page.appendChild(din);app.appendChild(page);
}

  page.appendChild(bsec);

  // Reset-Sektion

  page.innerHTML+=`<div style="padding:12px 13px;text-align:center;font-size:.73rem;color:var(--mt);line-height:1.7"><strong style="color:var(--tx);display:block;font-size:.83rem;margin-bottom:3px">🎣 Das Angeltagebuch von Norbert</strong>Version 1.2 · Offline-First<br/>💾 Alle Daten lokal gespeichert.</div>`;
  app.appendChild(page);
